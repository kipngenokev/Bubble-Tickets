spring.application.name=bubble-tickets
server.port=${PORT:8090}

# Database Connection - use environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# OAuth2 - use environment variables
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:9090/realms/event-ticket-platform}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

spring.web.resources.static-locations=classpath:/static/,file:/app/static/


logging.level.org.hibernate=DEBUG
logging.level.org.springframework.jdbc=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true