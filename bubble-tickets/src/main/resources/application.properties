spring.application.name=bubble-tickets
server.port=${PORT:8090}

# Database Connection - use environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bubble}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Kipngeno@123}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 - use environment variables
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:9090/realms/event-ticket-platform}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized